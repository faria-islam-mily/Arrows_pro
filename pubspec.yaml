name: arrow_pro
description: "Arrow Pro — a calm, premium arrow-escape puzzle game."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.3.2
  audioplayers: ^6.1.0
  in_app_purchase: ^3.2.0
  google_mobile_ads: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sfx/
    - assets/music/
    - assets/images/
